name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior in the backup script.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System & Environment
      description: "e.g., Windows (Git Bash), macOS, WSL, Ubuntu, etc."
    validations:
      required: true
